[onboard]
mode = local
no-install-daemon = true
auth-choice = setup-token
tailscale = off

[gateway]
mode = local
bind = lan
controlUi.allowedOrigins = ["http://localhost:18789","http://127.0.0.1:18789"]

[agents]
model.primary = "anthropic/claude-sonnet-4-6"
model.fallbacks = ["anthropic/claude-opus-4-6"]
compaction.memoryFlush.enabled = true
memorySearch.experimental.sessionMemory = false
memorySearch.sources = ["memory"]

[tools]
web.search.provider = duckduckgo
fs.workspaceOnly = false
exec.security = full
exec.ask = off
elevated.enabled = false
deny = ["group:automation","sessions_spawn","sessions_send"]

[logging]
redactSensitive = tools

[discovery]
mdns.mode = minimal

[hooks]
enable = boot-md,session-memory

[skills]
; Keep default startup prompt surface small for Claude Max.
; Install extra skills manually only when you need them.
